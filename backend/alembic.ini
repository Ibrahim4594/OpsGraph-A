# Alembic configuration for the RepoPulse storage layer (M2.0).
#
# DATABASE URL — never hard-coded in this file.
# At runtime, ``migrations/env.py`` reads ``REPOPULSE_DATABASE_URL`` from the
# environment (or falls back to ``Settings().database_url`` once that is
# implemented in M2.0 task 2). The ``sqlalchemy.url`` key below is left
# **empty on purpose** so an absent env var fails loudly rather than
# silently using a default.

[alembic]
# Path to migration scripts. Resolved relative to alembic.ini.
script_location = migrations

# Template used by ``alembic revision``. Stays default; we keep our own
# script.py.mako that adds explicit type annotations.
# file_template = %%(rev)s_%%(slug)s

# Timezone for the auto-generated ``# Revision ID ... # Date`` header.
timezone = UTC

# Truncate long slug components in revision filenames.
truncate_slug_length = 40

# Search ``versions/`` recursively (we keep a flat layout for now, but
# leave the option on so a future ``versions/2026/`` scheme works).
recursive_version_locations = false

# Empty by intention — see comment at top of file.
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
