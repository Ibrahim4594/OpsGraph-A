name: ci

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Typecheck (mypy)
        run: mypy
      - name: Test (unit gate)
        # Marker exclusion matches the local guardrail: integration / e2e /
        # migration tests need Docker / Postgres and run in their own job.
        run: pytest -m "not integration and not e2e and not migration" -q

  migrations:
    name: migrations (postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Migrations (upgrade/downgrade reversibility)
        # Testcontainers-Postgres provisions its own ephemeral Postgres
        # via Docker (preinstalled on ubuntu-latest runners). The offline
        # SQL-emit smoke runs even without Docker; the reversibility
        # tests need it.
        run: pytest -m migration -q

  integration:
    name: integration (postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Integration (repos + orchestrator vs real Postgres)
        # Same Testcontainers / ubuntu-latest pattern as migrations.
        # One session-scoped container; per-test TRUNCATE CASCADE keeps
        # tests hermetic. See backend/tests/integration/conftest.py.
        run: pytest -m integration -q
