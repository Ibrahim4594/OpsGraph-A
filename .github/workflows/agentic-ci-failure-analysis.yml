name: agentic-ci-failure-analysis

# Runs after another workflow concludes with `failure`. Calls the backend
# to classify the likely cause and proposes a next action. Posts a
# comment on the head commit (or PR if one exists). Comment-only — never
# re-runs jobs, never merges.

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  actions: read   # needed to read the failed run's context only

env:
  REPOPULSE_BACKEND_URL: ${{ vars.REPOPULSE_BACKEND_URL }}
  REPOPULSE_AGENTIC_TOKEN: ${{ secrets.REPOPULSE_AGENTIC_TOKEN }}

jobs:
  analyze:
    if: ${{ vars.REPOPULSE_AGENTIC_ENABLED != 'false' && github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Call backend ci-failure
        id: analyze
        run: python .github/workflows/scripts/agentic_call.py ci-failure

      - name: Record usage telemetry
        run: python .github/workflows/scripts/agentic_call.py usage

      - name: Post failure summary
        if: ${{ vars.REPOPULSE_AGENTIC_DRYRUN != 'true' }}
        uses: actions/github-script@v7
        env:
          RESULT_JSON: ${{ steps.analyze.outputs.result_json }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        with:
          script: |
            const result = JSON.parse(process.env.RESULT_JSON);
            if (result.disabled) {
              core.info('Agentic disabled at backend; no comment posted.');
              return;
            }
            const body = [
              `🤖 **RepoPulse CI Failure Analysis** (read-only suggestion)`,
              ``,
              `- **Likely cause:** \`${result.likely_cause}\``,
              `- **Suggested next action:** \`${result.next_action}\``,
              `- **Failed run:** ${process.env.RUN_URL}`,
              ``,
              `<details><summary>Evidence trace</summary>`,
              ``,
              ...result.evidence_trace.map(line => `- ${line}`),
              ``,
              `</details>`,
            ].join('\n');
            // Find a PR for this commit, if any.
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.payload.workflow_run.head_sha,
            });
            if (prs.data.length === 0) {
              core.info('No PR associated with this commit; skipping comment.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs.data[0].number,
              body,
            });
