# OpenTelemetry Collector configuration for local RepoPulse development.
#
# Receives OTLP traces / metrics / logs from the FastAPI backend on
# 4317 (gRPC) and 4318 (HTTP), batches, and exports to:
#   - debug exporter (stdout) for live inspection
#   - file exporter (/etc/otel/output/*.jsonl) for diff-able evidence
#
# This config is intentionally minimal for M2. Production exporters
# (Prometheus, Tempo, Loki, Grafana Cloud, Honeycomb, etc.) are added
# in later milestones.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:*"
            - "http://127.0.0.1:*"

processors:
  batch:
    send_batch_size: 1024
    timeout: 1s
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 25

exporters:
  debug:
    verbosity: detailed
  file/traces:
    path: /etc/otel/output/spans.jsonl
    rotation:
      max_megabytes: 10
      max_days: 3
      max_backups: 3
  file/metrics:
    path: /etc/otel/output/metrics.jsonl
    rotation:
      max_megabytes: 10
      max_days: 3
      max_backups: 3
  file/logs:
    path: /etc/otel/output/logs.jsonl
    rotation:
      max_megabytes: 10
      max_days: 3
      max_backups: 3

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, file/traces]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, file/metrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, file/logs]
