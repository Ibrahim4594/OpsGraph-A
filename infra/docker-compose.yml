services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: repopulse-otel-collector
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
      - ./output:/etc/otel/output
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # health_check (if enabled later)
    restart: unless-stopped
